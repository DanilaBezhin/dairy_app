<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный дневник</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="app-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">◆</span>
                <div class="logo-text">
                    <span class="logo-title">Дневник</span>
                    <span class="logo-sub">личные записи</span>
                </div>
            </div>
        </div>

        <div class="sidebar-stats" id="stats-block">
            <div class="stat-item">
                <span class="stat-num" id="stat-total">—</span>
                <span class="stat-label">записей</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <span class="stat-num" id="stat-month">—</span>
                <span class="stat-label">в этом месяце</span>
            </div>
        </div>

        <button class="btn-new" id="btn-new-note">
            <span class="btn-new-icon">+</span>
            Новая запись
        </button>

        <div class="sidebar-controls">
            <div class="search-wrap">
                <span class="search-icon">⌕</span>
                <input type="text" id="search-input" placeholder="Поиск по записям..." class="search-input">
                <button class="search-clear" id="search-clear" style="display:none">×</button>
            </div>

            <div class="sort-wrap">
                <span class="sort-label">Сортировка:</span>
                <div class="sort-btns">
                    <button class="sort-btn active" data-sort="desc">Новые</button>
                    <button class="sort-btn" data-sort="asc">Старые</button>
                </div>
            </div>
        </div>

        <div class="notes-list" id="notes-list">
            <div class="empty-state-sidebar">
                <span>Загрузка...</span>
            </div>
        </div>
    </aside>

    <!-- MAIN AREA -->
    <main class="main-area">

        <!-- WELCOME SCREEN -->
        <div class="welcome-screen" id="welcome-screen">
            <div class="welcome-content">
                <div class="welcome-decoration">◆</div>
                <h1 class="welcome-title">Твоё пространство<br><em>для мыслей</em></h1>
                <p class="welcome-sub">Выбери запись из списка или создай новую</p>
                <button class="btn-welcome" id="btn-welcome-new">Создать первую запись</button>
            </div>
        </div>

        <!-- NOTE VIEW -->
        <div class="note-view" id="note-view" style="display:none">
            <div class="note-toolbar">
                <div class="note-meta-top">
                    <span class="note-date-display" id="view-date"></span>
                    <span class="note-mood-badge" id="view-mood"></span>
                </div>
                <div class="note-actions">
                    <button class="action-btn edit-btn" id="btn-edit-note" title="Редактировать">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        Изменить
                    </button>
                    <button class="action-btn delete-btn" id="btn-delete-note" title="Удалить">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                        Удалить
                    </button>
                </div>
            </div>
            <div class="note-content-area">
                <h1 class="note-title-display" id="view-title"></h1>
                <div class="note-tags-display" id="view-tags"></div>
                <div class="note-body-display" id="view-content"></div>
            </div>
        </div>

        <!-- EDITOR -->
        <div class="note-editor" id="note-editor" style="display:none">
            <div class="editor-toolbar">
                <span class="editor-mode-label" id="editor-mode-label">Новая запись</span>
                <div class="editor-actions">
                    <button class="action-btn cancel-btn" id="btn-cancel-edit">Отменить</button>
                    <button class="action-btn save-btn" id="btn-save-note">Сохранить</button>
                </div>
            </div>

            <div class="editor-body">
                <input type="hidden" id="edit-note-id">
                <input type="text" id="edit-title" class="editor-title-input" placeholder="Заголовок записи...">

                <div class="editor-meta-row">
                    <div class="mood-select-wrap">
                        <span class="meta-label">Настроение:</span>
                        <div class="mood-options" id="mood-options">
                            <button class="mood-btn" data-mood="great" title="Отлично">😄</button>
                            <button class="mood-btn" data-mood="good" title="Хорошо">🙂</button>
                            <button class="mood-btn active" data-mood="neutral" title="Нейтрально">😐</button>
                            <button class="mood-btn" data-mood="bad" title="Плохо">😔</button>
                            <button class="mood-btn" data-mood="awful" title="Ужасно">😞</button>
                        </div>
                    </div>
                    <div class="tags-wrap">
                        <span class="meta-label">Теги:</span>
                        <input type="text" id="edit-tags" class="tags-input" placeholder="работа, идеи, личное...">
                    </div>
                </div>

                <textarea id="edit-content" class="editor-textarea" placeholder="Что у тебя на уме сегодня?..."></textarea>

                <div class="editor-footer">
                    <span class="char-count" id="char-count">0 символов</span>
                </div>
            </div>
        </div>

    </main>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-overlay" id="delete-modal" style="display:none">
    <div class="modal">
        <div class="modal-icon">⚠</div>
        <h3 class="modal-title">Удалить запись?</h3>
        <p class="modal-text">Это действие необратимо. Запись будет удалена навсегда.</p>
        <div class="modal-btns">
            <button class="modal-btn cancel" id="modal-cancel">Отмена</button>
            <button class="modal-btn confirm" id="modal-confirm">Удалить</button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="/static/js/app.js"></script>
</body>
</html>
