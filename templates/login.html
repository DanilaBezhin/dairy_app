<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Личный дневник</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body class="auth-body">

<div class="auth-wrapper">
    <div class="auth-decoration">◆</div>

    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-title">Дневник</h1>
            <p class="auth-sub" id="auth-tab-label">Войди, чтобы продолжить записи</p>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Вход</button>
            <button class="auth-tab" data-tab="register">Регистрация</button>
        </div>

        <form class="auth-form" id="auth-form">
            <div class="auth-field">
                <label class="auth-label">Логин</label>
                <input type="text" id="auth-username" class="auth-input" placeholder="login" autocomplete="username" required>
            </div>
            <div class="auth-field">
                <label class="auth-label">Пароль</label>
                <input type="password" id="auth-password" class="auth-input" placeholder="••••••••" autocomplete="current-password" required>
            </div>

            <div class="auth-error" id="auth-error" style="display:none"></div>

            <button type="submit" class="auth-submit" id="auth-submit">Войти</button>
        </form>
    </div>
</div>

<script src="/static/js/auth.js"></script>
</body>
</html>
